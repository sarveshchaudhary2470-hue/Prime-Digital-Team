<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>PRIME DIGITAL | Award-Winning Digital Agency</title>
    <meta name="description" content="Prime Digital is an award-winning digital agency specializing in web development, social media marketing, SEO, branding, and UI/UX design. Transform your business with our expert digital solutions." />

    <meta name="author" content="Prime Digital Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://primedigital.com/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://primedigital.com/" />
    <meta property="og:title" content="PRIME DIGITAL | Award-Winning Digital Agency" />
    <meta property="og:description" content="Transform your brand with Prime Digital — expert web development, social media marketing, SEO, and branding solutions that deliver real results." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="Prime Digital" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PRIME DIGITAL | Award-Winning Digital Agency" />
    <meta name="twitter:description" content="Transform your brand with Prime Digital — expert web development, social media marketing, SEO, and branding solutions." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Theme & Mobile -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />

        "addressRegion": "MH",
        "postalCode": "400053",
        "addressCountry": "IN"
